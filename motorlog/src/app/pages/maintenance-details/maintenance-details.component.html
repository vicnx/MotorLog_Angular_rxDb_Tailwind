<div class="mx-auto max-w-md sm:max-w-screen-md px-6 sm:pt-6 sm:pb-4 my-0 sm:my-5 bg-white border-0 sm:shadow-lg sm:rounded-3xl">
	<div class="flex flex-col justify-center items-center">
		<app-vehicle-selector [disabled]="isEdit"></app-vehicle-selector>
	</div>
	<div class="container mx-auto max-w-screen-md">
		<form class="p-4" [formGroup]="mantForm" (ngSubmit)="onSubmit()">
			<div class="mb-4">
				<label for="date" class="block text-gray-700 text-sm font-bold mb-2">{{ 'pages.mant-details.add-mant.date' | translate }}</label>
				<p-calendar
					id="date"
					formControlName="date"
					dateFormat="dd/mm/yy"
					[placeholder]="'pages.mant-details.add-mant.date' | translate"
					[showTime]="true"
					[hourFormat]="'24'"
					[iconDisplay]="'input'"
					[showIcon]="true"
					[style]="{ width: '100%' }"
					[required]="true"
				></p-calendar>
				<div *ngIf="mantForm?.get('date')?.invalid && mantForm?.get('date')?.touched" class="text-red-500 text-sm mt-1">
					{{ 'pages.mant-details.add-mant.validations.date_required' | translate }}
				</div>
			</div>
			<div class="mb-4">
				<label for="odometer" class="block text-gray-700 text-sm font-bold mb-2">{{
					'pages.mant-details.add-mant.odometer' | translate
				}}</label>
				<p-inputNumber
					[style]="{ width: '100%' }"
					id="odometer"
					formControlName="odometer"
					mode="decimal"
					[min]="0"
					class="w-full"
				></p-inputNumber>
			</div>
			<div class="mb-4">
				<div class="flex justify-between items-center mb-2">
					<label for="serviceType" class="block text-gray-700 text-sm font-bold">
						{{ 'pages.mant-details.add-mant.service-type.name' | translate }}
					</label>
					<p-button *ngIf="!isConsulta" icon="fa fa-plus" [rounded]="true" [text]="true" size="small" (onClick)="openAddCustomService()" type="button">
					</p-button>
				</div>
				<p-multiSelect
					id="serviceType"
					formControlName="serviceType"
					[options]="serviceTypes"
					placeholder="{{ 'pages.mant-details.add-mant.service-type.name' | translate }}"
					[style]="{ width: '100%' }"
					optionLabel="desc"
					dataKey="value"
					[autofocusFilter]="false"
				>
					<ng-template let-service pTemplate="item">
						<div class="flex items-center gap-2 max-w-[85vw] sm:max-w-full">
							<i [class]="service.icon" [style.color]="service.color || '#6b7280'" class="shrink-0"></i>
							<span class="whitespace-normal break-words leading-tight">{{ service.desc | translate }}</span>

							<span *ngIf="service.isOrphan" class="text-[10px] text-red-400 font-bold italic shrink-0">
								({{ 'pages.custom-services.deleted' | translate }})
							</span>
						</div>
					</ng-template>
				</p-multiSelect>
				<ul class="list-inside text-xs pt-2" *ngIf="mantForm.get('serviceType')?.value?.length">
					<li *ngFor="let service of mantForm.get('serviceType')?.value" class="text-gray-500">
                        <i [class]="service.icon" [style.color]="service.color || '#6b7280'"></i>
						{{ service.label | translate }}
						<span *ngIf="isOrphan(service.value)" class="text-red-400 font-bold italic">
							{{ 'pages.custom-services.deleted' | translate }}
						</span>
					</li>
				</ul>
			</div>

			<div class="mb-4">
				<div class="flex justify-between items-center mb-2">
					<label for="location" class="block text-gray-700 text-sm font-bold">
						{{ 'pages.mant-details.add-mant.location' | translate }}
					</label>
					<p-button *ngIf="!isConsulta" icon="fa fa-plus" [rounded]="true" [text]="true" size="small" (onClick)="openAddLocation()" type="button">
					</p-button>
				</div>
				<p-dropdown
					id="location"
					formControlName="location"
					[options]="locations"
					placeholder="{{ 'pages.mant-details.add-mant.location' | translate }}"
					[style]="{ width: '100%' }"
					optionLabel="label"
					optionValue="label"
					[showClear]="true"
				>
				</p-dropdown>
			</div>

			<div class="mb-4">
				<label for="amount" class="block text-gray-700 text-sm font-bold mb-2">{{ 'pages.mant-details.add-mant.amount' | translate }}</label>
				<p-inputNumber
					[style]="{ width: '100%' }"
					id="amount"
					formControlName="amount"
					mode="currency"
					currency="EUR"
					locale="es-ES"
					class="w-full"
					[min]="0"
					[max]="1000000"
				></p-inputNumber>
			</div>
			<div class="mb-4">
				<label for="notes" class="block text-gray-700 text-sm font-bold mb-2">{{ 'pages.mant-details.add-mant.notes' | translate }}</label>
				<input
					[style]="{ width: '100%' }"
					pInputText
					type="text"
					class="w-full p-inputtext"
					[placeholder]="'pages.mant-details.add-mant.notes' | translate"
					formControlName="notes"
					maxlength="50"
				/>
			</div>
			<app-image-selector
				*ngIf="!isConsulta || imageControl.value"
				[imageControl]="imageControl"
				[label]="'pages.mant-details.add-mant.imagen' | translate"
				[modoConsulta]="isConsulta"
			></app-image-selector>

			<div class="mb-4">
				<label for="description" class="block text-gray-700 text-sm font-bold mb-2">{{
					'pages.mant-details.add-mant.description' | translate
				}}</label>
				<textarea id="description" pInputTextarea [style]="{ width: '100%' }" formControlName="description" class="w-full" rows="4"></textarea>
			</div>

			<div *ngIf="!isConsulta" class="flex flex-col gap-3 mt-8 pt-4 border-t border-gray-100">
				<button
					pButton
					type="submit"
					class="w-full !rounded-full !bg-primary-500 !border-none !py-3.5 shadow-lg shadow-primary-500/30 hover:shadow-xl hover:shadow-primary-500/40 hover:-translate-y-0.5 transition-all duration-300 flex justify-center items-center gap-2"
				>
					<i class="fa fa-check text-white"></i>
					<span class="font-semibold text-white text-[1.05rem]">{{ 'pages.mant-details.add-mant.submit' | translate }}</span>
				</button>
				<button
					*ngIf="isEdit"
					pButton
					type="button"
					class="p-button-text p-button-danger w-full !rounded-full !py-2.5 hover:bg-red-50 transition-colors flex justify-center items-center gap-2"
					(click)="deleteMaintenance()"
				>
					<i class="fa fa-trash text-red-500"></i>
					<span class="font-medium text-red-500">Eliminar</span>
				</button>
			</div>
		</form>
	</div>
</div>

<button
	*ngIf="isEdit && isConsulta"
	(click)="toggleEditMode()"
	type="button"
	class="fixed bottom-6 right-6 bg-blue-600 hover:bg-blue-700 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-xl transition-all duration-300 z-[9999] cursor-pointer"
>
	<i class="fas fa-pencil-alt text-xl"></i>
</button>
