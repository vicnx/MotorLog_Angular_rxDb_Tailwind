<nav class="bg-white border-b border-gray-50 dark:bg-gray-900 sticky top-0 z-50">
  <div class="relative max-w-screen-xl flex items-center justify-between mx-auto px-4 h-16">
    
    <!-- LEFT: Back Button -->
    <div class="flex-1 flex justify-start z-10">
      <p-button *ngIf="!isHomePage" icon="fas fa-chevron-left" (onClick)="goBack()" [text]="true" severity="secondary" styleClass="!text-gray-600 hover:!bg-gray-100 !rounded-full !w-10 !h-10" />
    </div>

    <!-- CENTER: Title (Perfectly Centered) -->
    <div class="absolute inset-0 flex justify-center items-center pointer-events-none">
      <h1 class="text-gray-900 font-bold sm:text-2xl text-xl dark:text-white pointer-events-auto">
        {{userSvc.page() | translate}}
      </h1>
    </div>

    <!-- RIGHT: Avatar Menu -->
    <div class="flex-1 flex justify-end z-10">
      <button (click)="toggleSidebar()" type="button" class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-gray-50 border border-gray-200 hover:bg-gray-100 hover:shadow-sm focus:outline-none focus:ring-2 focus:ring-gray-200 transition-all overflow-hidden dark:bg-gray-800 dark:border-gray-700">
        <img *ngIf="avatar" [src]="avatar" alt="Avatar" class="w-full h-full object-cover" />
        <i *ngIf="!avatar" class="fas fa-user text-gray-400"></i>
      </button>
    </div>

  </div>
</nav>
<div class="card flex justify-content-center">
  <app-sidebar></app-sidebar>
</div>
