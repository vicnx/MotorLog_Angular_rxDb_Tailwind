@if(vehicleSvc.vehicles().length > 0){
<p-dropdown
	[options]="this.vehicleSvc.vehicles()"
	[(ngModel)]="selectedVehicle"
	optionLabel="nombreVehiculo"
	placeholder="Vehicle"
	optionValue="id"
	(onChange)="switchVehicle($event)"
	[style]="{ minWidth: '200px', maxWidth: '200px', marginTop: '5px' }"
	[disabled]="disabled"
	styleClass="!rounded-full !bg-white hover:!bg-gray-50 !shadow-sm !border !border-gray-200 transition-all text-gray-700 font-medium [&_.p-dropdown-label]:!flex [&_.p-dropdown-label]:!justify-start [&_.p-dropdown-label]:!items-center"
>
	<ng-template let-item pTemplate="selectedItem">
		<div class="flex items-center justify-start gap-2 w-full pl-2">
			<i class="{{ item?.icono }}"></i>
			<span>{{ item?.nombreVehiculo }}</span>
		</div>
	</ng-template>
	<ng-template let-item pTemplate="item">
		<div class="block text-sm text-gray-700 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-gray-600 dark:hover:text-white">
			<div class="inline-flex items-center">
				<i class="{{ item.icono }} rounded-sm mr-2"></i>
				{{ item.nombreVehiculo }}
			</div>
		</div>
	</ng-template>
</p-dropdown>

}@else{
  <app-add-vehicle-button></app-add-vehicle-button>
}
